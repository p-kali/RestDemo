name: RestDemo CI

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # Setup Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # Build the project
      - name: Build with Maven
        run: mvn clean install -Dspring.profiles.active=test

#      # Upload JAR artifact
#      - name: Upload artifact
#        uses: actions/upload-artifact@v4
#        with:
#          name: RestDemo-app
#          path: target/*.jar

      # Deploy to EC2
      - name: Deploy - Stop App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: false
          script: |
            cd /home/ubuntu/app
            PID=$(pgrep -f "java.*rest-demo" | head -n 1)
            if [ -n "$PID" ]; then
              echo "Stopping app with PID $PID"
              kill "$PID" 2>/dev/null || true
              sleep 2
              kill -9 "$PID" 2>/dev/null || true
              echo "App stopped"
            else
              echo "App not running"
            fi
            exit 0

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/*.jar"
          target: "/home/ubuntu/app/"

      - name: Start App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            export DB_URL=${{ secrets.DB_URL }}
            export DB_USERNAME=${{ secrets.DB_USERNAME }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            # Add disown to fully detach from the SSH session
            nohup java -jar *.jar > app.log 2>&1 & disown
