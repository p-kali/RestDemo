name: RestDemo CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2️⃣ Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # 3️⃣ Cache Maven dependencies
      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      # 5️⃣ Build the project
      - name: Build with Maven
        run: mvn clean package -Dspring.profiles.active=test

      # 1️⃣ Ensure target folder exists on EC2
      - name: Create app folder on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            mkdir -p /home/ubuntu/app
            rm -f /home/ubuntu/app/*.jar

      # 6️⃣ Copy latest JAR to EC2
#      - name: Copy latest JAR to EC2
#        uses: appleboy/scp-action@v0.1.7
#        with:
#          host: ${{ secrets.EC2_HOST }}
#          username: ${{ secrets.EC2_USER }}
#          key: ${{ secrets.EC2_SSH_KEY }}
#          source: "$(ls target/*.jar | grep -v '.original' | sort -V | tail -n 1)"
#          target: "/home/ubuntu/app/rest-demo.jar"
      - name: Copy latest JAR to EC2
        run: |
          # Find the latest jar (skip .original)
          LATEST_JAR=$(ls target/*.jar | grep -v '.original' | sort -V | tail -n 1)
          echo "Latest JAR to copy: $LATEST_JAR"

          # Use scp to copy it to EC2
          scp -i ${{ secrets.EC2_SSH_KEY }} -o StrictHostKeyChecking=no "$LATEST_JAR" ubuntu@${{ secrets.EC2_HOST }}:/home/ubuntu/app/rest-demo.jar

      - name: Verify jar on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Files in /home/ubuntu/app:"
            ls -lh /home/ubuntu/app

      # 7️⃣ Restart systemd service on EC2
      - name: Restart App using systemd
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Restart Spring Boot service
            sudo systemctl restart rest-demo
            # Check status
            sudo systemctl status rest-demo --no-pager