name: RestDemo CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      - name: Build with Maven
        run: |
            mvn clean package -Dspring.profiles.active=test
            echo "Built JAR timestamp:"
            ls -lh target/rest-demo.jar
            echo "Checking compiled class timestamps:"
            unzip -p target/rest-demo.jar BOOT-INF/classes/com/example/restdemo/YourController.class | file -
            echo "Git commit in this build:"
            git log -1 --oneline

      - name: Stop App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            sudo systemctl stop rest-demo || true
            sleep 2

      - name: Copy JAR to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "target/rest-demo.jar"
          target: "/home/ubuntu/"
          strip_components: 1

      - name: Write env file on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cat > /home/ubuntu/app/.env << 'EOF'
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            EOF
            chmod 600 /home/ubuntu/app/.env

      - name: Move JAR and Start App
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Move new JAR into place
            mv -f /home/ubuntu/rest-demo.jar /home/ubuntu/app/rest-demo.jar
            echo "JAR details:"
            ls -lh /home/ubuntu/app/rest-demo.jar
            
            # Reload and start
            sudo systemctl daemon-reload
            sudo systemctl start rest-demo
            sleep 3
            sudo systemctl status rest-demo --no-pager