      # =====================================================
      # NEW BLUE GREEN DEPLOYMENT
      # =====================================================
      - name: Blue Green Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            
            DEPLOY_TIME=$(date '+%Y-%m-%d %H:%M:%S')
            echo "Deployment time: $DEPLOY_TIME"
            
            cd /home/ubuntu/app
            
            NEW_VERSION=${{ env.NEW_VERSION }}
            echo "Deploying version: $NEW_VERSION"
            
            ACTIVE=$(cat active_env)
            
            if [ "$ACTIVE" = "blue" ]; then
              TARGET="green"
              TARGET_PORT=8081
              TARGET_SERVICE="rest-demo-green"
              OLD_SERVICE="rest-demo-blue"
            else
              TARGET="blue"
              TARGET_PORT=8080
              TARGET_SERVICE="rest-demo-blue"
              OLD_SERVICE="rest-demo-green"
            fi
            
            echo "Active: $ACTIVE"
            echo "Deploying to: $TARGET"
            
            VERSION_JAR="rest-demo-${NEW_VERSION}.jar"
            mv /home/ubuntu/rest-demo.jar $VERSION_JAR
  
            ln -sfn $VERSION_JAR rest-demo-$TARGET.jar
            
            echo "Starting $TARGET_SERVICE"
            sudo systemctl daemon-reload
            sudo systemctl restart $TARGET_SERVICE
            
            echo "Checking service status..."
            sudo systemctl status $TARGET_SERVICE --no-pager
            
            echo "Health check on port $TARGET_PORT"
            HEALTH_OK=false
            for i in {1..10}; do
              RESPONSE=$(curl -s -m 3 http://localhost:$TARGET_PORT/actuator/health || true)
              echo "Attempt $i: $RESPONSE"
              if echo "$RESPONSE" | grep -q '"status":"UP"'; then
                HEALTH_OK=true
                break
              fi
              sleep 5
            done
            
            if [ "$HEALTH_OK" != "true" ]; then
              echo "Health check failed"
              sudo systemctl stop $TARGET_SERVICE
              exit 1
            fi
            
            echo "Switching nginx to $TARGET_PORT"
            sudo sed -i "s/localhost:[0-9]*/localhost:$TARGET_PORT/" /etc/nginx/sites-available/default
            if sudo nginx -t; then
              sudo systemctl reload nginx
            else
              echo "Nginx config failed — not switching traffic"
              sudo systemctl stop $TARGET_SERVICE
              exit 1
            fi
            
            echo $TARGET > active_env
            
            echo "Stopping old service $OLD_SERVICE"
            sudo systemctl stop $OLD_SERVICE
            
            echo "Deployment successful"
            
            echo "$DEPLOY_TIME - Deploying $NEW_VERSION to $TARGET" >> deploy-history.log
            
            # cleanup old jars (keep last 5)
            ls -t rest-demo-*.jar \
            | grep -v "$(readlink rest-demo-blue.jar)" \
            | grep -v "$(readlink rest-demo-green.jar)" \
            | tail -n +6 | xargs -r rm -f
            
            echo "================================="
            echo "Deployment Summary"
            echo "Version : $NEW_VERSION"
            echo "Target  : $TARGET"
            echo "Port    : $TARGET_PORT"
            echo "Time    : $DEPLOY_TIME"
            echo "================================="

