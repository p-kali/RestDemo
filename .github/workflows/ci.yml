      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-m2

      #Dspring.profiles.active=test because application-test.yaml file has H2 in-mem database config
      - name: Build with Maven
        run: |
          mvn clean package -Dspring.profiles.active=test
          ls -lh target/rest-demo.jar
          echo "Git commit:"
          git log -1 --oneline
          echo "NEW_VERSION=$(git rev-parse --short HEAD)" >> $GITHUB_ENV
      

