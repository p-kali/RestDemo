name: RestDemo Docker CI

on:
  push:
    branches: [ "docker" ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      #Dspring.profiles.active=test because application-test.yaml file has H2 in-mem database config
      - name: Build JAR
        #run: mvn clean package -DskipTests
        run: mvn clean package -Dspring.profiles.active=test

      - name: Build Docker Image
        run: docker build -t rest-demo:test .