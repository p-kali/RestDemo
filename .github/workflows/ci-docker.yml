name: RestDemo Docker CI

on:
  push:
    branches: [ "docker" ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      #Dspring.profiles.active=test because application-test.yaml file has H2 in-mem database config
      - name: Build JAR
        #run: mvn clean package -DskipTests
        run: mvn clean package -Dspring.profiles.active=test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login \
            --username AWS \
            --password-stdin 193849564091.dkr.ecr.us-east-1.amazonaws.com

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t rest-demo:${{ env.SHORT_SHA }} .

      - name: Tag Image
        run: |
          docker tag rest-demo:${{ env.SHORT_SHA }} \
          193849564091.dkr.ecr.us-east-1.amazonaws.com/backend/rest-demo:${{ env.SHORT_SHA }}

          docker tag rest-demo:${{ env.SHORT_SHA }} \
          193849564091.dkr.ecr.us-east-1.amazonaws.com/backend/rest-demo:latest

      - name: Push Image
        run: |
          docker push 193849564091.dkr.ecr.us-east-1.amazonaws.com/backend/rest-demo:${{ env.SHORT_SHA }}
          docker push 193849564091.dkr.ecr.us-east-1.amazonaws.com/backend/rest-demo:latest

      # =====================================================
      # BLUE GREEN DEPLOYMENT
      # =====================================================
      - name: Blue Green Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -euo pipefail
            
            DEPLOY_TIME=$(date '+%Y-%m-%d %H:%M:%S')
            echo "Deployment time: $DEPLOY_TIME"
            
            cd /home/ubuntu
            
            # -----------------------------
            # AWS ECR Login
            # -----------------------------
            aws ecr get-login-password --region us-east-1 \
            | docker login \
            --username AWS \
            --password-stdin 193849564091.dkr.ecr.us-east-1.amazonaws.com
            
            docker pull 193849564091.dkr.ecr.us-east-1.amazonaws.com/backend/rest-demo:${{ env.SHORT_SHA }}
            
            # -----------------------------
            # Read active deployment and SHA
            # -----------------------------
            ACTIVE=$(cat active_env)
            CURRENT_SHA=$(cat active_sha)
          
            echo "Current active env: $ACTIVE"
            echo "Current active SHA: $CURRENT_SHA"
          
            # Save  previous SHA for rollback
            echo "$CURRENT_SHA" > previous_sha
            
            # -----------------------------
            # Determine target environment
            # -----------------------------
            if [ "$ACTIVE" = "blue" ]; then
              TARGET="green"
              TARGET_PORT=8081
            else
              TARGET="blue"
              TARGET_PORT=8080
            fi
          
            echo "Deploying to: $TARGET on port $TARGET_PORT"
          
            # -----------------------------
            # Fetch secrets from Parameter Store
            # -----------------------------
            echo "Fetching secrets from AWS Parameter Store"
            
            DB_URL=$(aws ssm get-parameter --name "/rest-demo/DB_URL" --with-decryption --query "Parameter.Value" --output text)
            DB_USERNAME=$(aws ssm get-parameter --name "/rest-demo/DB_USERNAME" --with-decryption --query "Parameter.Value" --output text)
            DB_PASSWORD=$(aws ssm get-parameter --name "/rest-demo/DB_PASSWORD" --with-decryption --query "Parameter.Value" --output text)
            DB_DRIVER=$(aws ssm get-parameter --name "/rest-demo/DB_DRIVER" --with-decryption --query "Parameter.Value" --output text)
            DB_DIALECT=$(aws ssm get-parameter --name "/rest-demo/DB_DIALECT" --with-decryption --query "Parameter.Value" --output text)
            
            # -----------------------------
            # Cleanup target container if exists
            # -----------------------------
            docker rm -f rest-demo-$TARGET || true
            
            # -----------------------------
            # Run new container
            # -----------------------------
            docker run -d \
              -p $TARGET_PORT:8080 \
              --name rest-demo-$TARGET \
              --restart unless-stopped \
              -e DB_URL="$DB_URL" \
              -e DB_USERNAME="$DB_USERNAME" \
              -e DB_PASSWORD="$DB_PASSWORD" \
              193849564091.dkr.ecr.us-east-1.amazonaws.com/backend/rest-demo:${{ env.SHORT_SHA }}
            
            # -----------------------------
            # Health check
            # -----------------------------
            HEALTH_OK=false
            for i in {1..12}; do
              RESPONSE=$(curl -s -m 3 http://localhost:$TARGET_PORT/actuator/health || true)
              echo "Attempt $i: $RESPONSE"
              if echo "$RESPONSE" | grep -q '"status":"UP"'; then
                HEALTH_OK=true
                break
              fi
              sleep 5
            done
            
            FINAL_PORT=$TARGET_PORT
            FINAL_ENV=$TARGET
            FINAL_SHA=${{ env.SHORT_SHA }}
            
            # -----------------------------
            # Rollback if health check fails
            # -----------------------------
            if [ "$HEALTH_OK" != "true" ]; then
              echo "Health check failed — rolling back"
            
              docker stop rest-demo-$TARGET || true
              docker rm -f rest-demo-$TARGET || true
            
              PREVIOUS_SHA=$(cat previous_sha)
              echo "Rolling back to previous SHA: $PREVIOUS_SHA"
            
              docker run -d \
                -p $TARGET_PORT:8080 \
                --name rest-demo-$TARGET \
                --restart unless-stopped \
                -e DB_URL="$DB_URL" \
                -e DB_USERNAME="$DB_USERNAME" \
                -e DB_PASSWORD="$DB_PASSWORD" \
                193849564091.dkr.ecr.us-east-1.amazonaws.com/backend/rest-demo:$PREVIOUS_SHA
            
              FINAL_SHA=$PREVIOUS_SHA
            fi
            
            # -----------------------------
            # Switch Nginx (single reload)
            # -----------------------------
            echo "Switching traffic to port $FINAL_PORT"
            
            sudo sed -i "s|proxy_pass http://localhost:.*|proxy_pass http://localhost:$FINAL_PORT;|" /etc/nginx/sites-available/default
            
            sudo nginx -t
            sudo systemctl reload nginx
            
            # -----------------------------
            # Mark new active environment
            # -----------------------------
            echo $FINAL_ENV > active_env
            echo $FINAL_SHA > active_sha
            
            # -----------------------------
            # Stop old container
            # -----------------------------
            docker stop rest-demo-$ACTIVE || true
            docker rm -f rest-demo-$ACTIVE || true
            
            # -----------------------------
            # Cleanup dangling images
            # -----------------------------
            docker image prune -f
            
            # -----------------------------
            # Log deployment
            # -----------------------------
            echo "$DEPLOY_TIME - Deploy successful - SHA $FINAL_SHA - ENV $FINAL_ENV" >> deploy-history.log
            
            echo "Deployment complete"
