name: RestDemo Docker CI

on:
  push:
    branches: [ "docker" ]

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      #Dspring.profiles.active=test because application-test.yaml file has H2 in-mem database config
      - name: Build JAR
        #run: mvn clean package -DskipTests
        run: mvn clean package -Dspring.profiles.active=test

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        run: |
          aws ecr get-login-password --region $AWS_REGION \
          | docker login \
            --username AWS \
            --password-stdin 193849564091.dkr.ecr.us-east-1.amazonaws.com

      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      - name: Build Docker Image
        run: |
          docker build -t rest-demo:${{ env.SHORT_SHA }} .

      - name: Tag Image
        run: |
          docker tag rest-demo:${{ env.SHORT_SHA }} \
          193849564091.dkr.ecr.us-east-1.amazonaws.com/backend/rest-demo:${{ env.SHORT_SHA }}

          docker tag rest-demo:${{ env.SHORT_SHA }} \
          193849564091.dkr.ecr.us-east-1.amazonaws.com/backend/rest-demo:latest

      - name: Push Image
        run: |
          docker push 193849564091.dkr.ecr.us-east-1.amazonaws.com/backend/rest-demo:${{ env.SHORT_SHA }}
          docker push 193849564091.dkr.ecr.us-east-1.amazonaws.com/backend/rest-demo:latest

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DOCKER_EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            aws ecr get-login-password --region us-east-1 \
            | docker login \
            --username AWS \
            --password-stdin 193849564091.dkr.ecr.us-east-1.amazonaws.com

            docker pull 193849564091.dkr.ecr.us-east-1.amazonaws.com/backend/rest-demo:${{ env.SHORT_SHA }}

            docker stop rest-demo || true
            docker rm rest-demo || true

            docker run -d \
            -p 8080:8080 \
            --name rest-demo \
            --env-file .env \
            193849564091.dkr.ecr.us-east-1.amazonaws.com/backend/rest-demo:${{ env.SHORT_SHA }}
            
            docker image prune -f --filter "until=24h"